train_dataset:
  img_dir: ../smoke_data/train/Imgs
  depth_dir: ../smoke_data/train/Depth_pseudo
  mask_dir: ../smoke_data/train/GT
  edge_dir: ../smoke_data/train/Edge
  image_size: 224
  augment: true
  depth_drop_prob: 0.10
  depth_noise_std: 0.01
  depth_blur_prob: 0.05

val_dataset:
  enabled: true
  img_dir: ../smoke_data/val/Imgs
  depth_dir: ../smoke_data/val/Depth_pseudo
  mask_dir: ../smoke_data/val/GT
  image_size: 224

test_dataset:
  img_dir: ../smoke_data/val/Imgs
  depth_dir: ../smoke_data/val/Depth_pseudo
  mask_dir: ../smoke_data/val/GT
  image_size: 224

training:
  batch_size: 2
  num_workers: 0
  epoch_max: 1
  lr: 0.0001
  min_lr: 0.000001
  betas: [0.9, 0.999]
  weight_decay: 0.0001
  scheduler: cosine
  grad_clip: 1.0
  use_amp: false

  seg_loss_weight: 1.0
  base_loss_weight: 0.25
  aux_loss_weight: 0.2
  edge_loss_weight: 0.1
  gate_loss_weight: 0.05
  rectify_loss_weight: 0.05
  disagreement_loss_weight: 0.05
  uncertainty_loss_weight: 0.03
  entropy_loss_weight: 0.02

  seed: 42
  log_interval: 1
  save_every: 0
  save_dir: ./runs_smoke/default/checkpoints
  resume: null
  allow_mps: false

model:
  backbone_name: resnet18
  decoder_channels: 48
  pretrained_backbone: false
  rgb_weights_path: null
  depth_init_mode: random
  use_depth_branch: true
  fusion_mode: evidence
  use_rectifier: true
  use_disagreement_refinement: true
  use_edge_branch: true

testing:
  model_path: ./runs_smoke/default/checkpoints/checkpoint_best.pth
  strict_load: true
  output_dir: ./runs_smoke/default/results
  save_explain: true
